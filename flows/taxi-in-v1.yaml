slug: taxi-in-v1
schema_version: "2.0"
name: "Taxi-In — Post-Landing Ground Movement"
description: "Pilot contacts Ground after landing, receives taxi route to stand, reads back, and parks. Reusable for both VFR and IFR arrivals."

start_state: CONTACT_GROUND
end_states:
  - TAXI_IN_COMPLETE

entry_mode: main

variables:
  callsign:
    type: string
    initial: "G-ABCD"
    mutable_by: action_only
  runway:
    type: string
    initial: "25L"
    mutable_by: action_only
  # Parking spot to taxi to after landing.  Deliberately NOT named "destination":
  # that key is used by the inbound flight flows for the destination *airport*
  # (e.g. EDDM) and is carried across the flow chain in the shared session, so
  # reusing it here would make Ground say "taxi to EDDM" instead of the stand.
  parking_stand:
    type: string
    initial: "the apron"
    mutable_by: action_only
  taxi_route:
    type: string
    initial: "taxiway Alpha"
    mutable_by: action_only
  # Runways the computed route crosses, in order. Drives both the spoken
  # hold-short clause and the readback requirement. Empty list = no crossing.
  # Default mirrors the legacy static clearance for when route autocompute is
  # off or fails.
  crossing_runways:
    type: list
    initial:
      - "07"
    mutable_by: action_only
  # Ready-to-speak hold-short clause, e.g. ", hold short runway 07" or "".
  taxi_hold_clause:
    type: string
    initial: ", hold short runway 07"
    mutable_by: action_only

flags:
  taxi_in_clearance_given:
    initial: false

states:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Pilot contacts Ground after landing
  # ─────────────────────────────────────────────────────────────────────────────
  CONTACT_GROUND:
    role: pilot
    phase: taxi_in
    name: "Contact Ground After Landing"
    description: "Pilot calls Ground with callsign, confirms vacated runway, and states parking destination"
    expected_pilot_template: "{{callsign}}, vacated runway {{runway}}, for {{parking_stand}}"
    frequency: "121.800"
    frequency_name: "Ground"
    allow_greeting: true

    ok_next:
      - to: ATC_TAXI_IN_ROUTE
        trigger: "vacat|for.*apron|for.*stand|for.*terminal|for.*parking|parking|stand|apron"
        label: "Pilot called Ground with vacated report and destination"

    bad_next:
      - to: ATC_CONTACT_GROUND_INCORRECT
        label: "Incomplete call — controller prompts for callsign, vacated runway, and destination"

    auto_transitions: []

  ATC_CONTACT_GROUND_INCORRECT:
    role: atc
    phase: taxi_in
    name: "ATC Prompts for Correct Ground Contact"
    description: "Controller asks the pilot to report callsign, vacated runway, and parking destination"
    say_template: "{{callsign}}, say again, report vacated runway and destination"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: CONTACT_GROUND
        label: "Prompt given — pilot to retry"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Ground issues taxi-in route
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TAXI_IN_ROUTE:
    role: atc
    phase: taxi_in
    name: "Ground Issues Taxi-In Route"
    description: "Ground controller issues taxi route to destination, including any runway crossings"
    say_template: "{{callsign}}, taxi to {{parking_stand}} via {{taxi_route}}{{taxi_hold_clause}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_TAXI_IN_READBACK
        label: "Taxi-in route issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: taxi_in_clearance_given
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Pilot reads back taxi-in route
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_TAXI_IN_READBACK:
    role: pilot
    phase: taxi_in
    name: "Pilot Reads Back Taxi-In Route"
    description: "Pilot reads back taxi route and hold-short instruction — crossing runway is mandatory readback"
    expected_pilot_template: "Taxi to {{parking_stand}} via {{taxi_route}}{{taxi_hold_clause}}, {{callsign}}"
    frequency: "121.800"
    frequency_name: "Ground"

    readback_required:
      - crossing_runways
    readback_mode: simple

    ok_next:
      - to: ATC_TAXI_IN_CONFIRMED
        trigger: ".*"
        label: "Taxi-in readback evaluated — correct"

    bad_next:
      - to: ATC_TAXI_IN_READBACK_INCORRECT
        label: "Readback missing hold-short runway — controller corrects"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. ATC corrects incomplete taxi-in readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TAXI_IN_READBACK_INCORRECT:
    role: atc
    phase: taxi_in
    name: "ATC Corrects Taxi-In Readback"
    description: "Controller repeats the runway hold-short instruction for the pilot"
    say_template: "Negative, {{callsign}}, say again{{taxi_hold_clause}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_TAXI_IN_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Ground confirms readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TAXI_IN_CONFIRMED:
    role: atc
    phase: taxi_in
    name: "Ground Confirms Taxi-In Readback"
    description: "Ground confirms readback correct — pilot proceeds to stand"
    say_template: "Readback correct, {{callsign}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: TAXI_IN_COMPLETE
        label: "Taxi-in phase complete"

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. End state
  # ─────────────────────────────────────────────────────────────────────────────
  TAXI_IN_COMPLETE:
    role: system
    phase: taxi_in
    name: "Taxi-In Complete"
    description: "Post-landing ground movement complete. Proceed to {{parking_stand}} via {{taxi_route}}."

    ok_next: []
    bad_next: []
    auto_transitions: []
