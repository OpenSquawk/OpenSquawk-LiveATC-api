slug: departure-v1
schema_version: "2.0"
name: "Departure — Initial Climb"
description: "Pilot checks in with departure control after takeoff, receives radar contact and climb clearance, reads it back correctly"

start_state: INITIAL_CONTACT
end_states:
  - DEPARTURE_COMPLETE

entry_mode: main

variables:
  callsign:
    type: string
    initial: "DLH39A"
    mutable_by: action_only
  passing_altitude:
    type: string
    initial: "1500"
    mutable_by: action_only
  initial_altitude:
    type: string
    initial: "5000"
    mutable_by: action_only
  climb_altitude:
    type: string
    initial: "FL150"
    mutable_by: action_only
  waypoint:
    type: string
    initial: "BIBAX"
    mutable_by: action_only

flags:
  radar_contact:
    initial: false
  climb_clearance_issued:
    initial: false
  readback_correct:
    initial: false

states:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Pilot checks in with departure control
  # ─────────────────────────────────────────────────────────────────────────────
  INITIAL_CONTACT:
    role: pilot
    phase: departure
    name: "Initial Check-in with Departure"
    description: "Pilot calls departure control with callsign, passing altitude, and cleared altitude from the SID"
    expected_pilot_template: "{{callsign}}, passing {{passing_altitude}}, climbing {{initial_altitude}}"
    frequency_name: "Departure"
    allow_greeting: true

    ok_next:
      - to: ATC_RADAR_CONTACT
        trigger: "passing|climbing|departure|with you|check.*in|identified"
        label: "Pilot checked in with departure"

    bad_next:
      - to: ATC_INITIAL_CONTACT_INCORRECT
        label: "Incomplete check-in — controller prompts for passing altitude and cleared level"

    auto_transitions: []

  ATC_INITIAL_CONTACT_INCORRECT:
    role: atc
    phase: departure
    name: "ATC Prompts for Correct Check-in"
    description: "Controller asks the pilot to report callsign, passing altitude, and cleared climb level"
    say_template: "{{callsign}}, say again, pass your callsign, passing altitude, and cleared level"
    frequency_name: "Departure"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: INITIAL_CONTACT
        label: "Prompt given — pilot to retry check-in"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Departure establishes radar contact and issues climb clearance
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_RADAR_CONTACT:
    role: atc
    phase: departure
    name: "Departure Establishes Radar Contact"
    description: "Departure controller identifies the aircraft and issues a new climb clearance with routing"
    say_template: "{{callsign}}, radar contact, climb {{climb_altitude}}, direct {{waypoint}}"
    frequency_name: "Departure"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_CLIMB_READBACK
        label: "Radar contact and climb clearance given — awaiting pilot readback"
        on_enter_actions:
          - type: set_flag
            target: radar_contact
            value: true
          - type: set_flag
            target: climb_clearance_issued
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Pilot reads back climb clearance
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_CLIMB_READBACK:
    role: pilot
    phase: departure
    name: "Pilot Reads Back Climb Clearance"
    description: "Pilot must read back cleared climb level, routing waypoint, and own callsign"
    expected_pilot_template: "Climb {{climb_altitude}}, direct {{waypoint}}, {{callsign}}"
    frequency_name: "Departure"

    readback_required:
      - climb_altitude
      - waypoint
    readback_mode: simple

    ok_next:
      - to: ATC_CLIMB_CONFIRMED
        trigger: ".*"
        label: "Climb readback evaluated — correct"

    bad_next:
      - to: ATC_CLIMB_READBACK_INCORRECT
        label: "Readback missing climb level or waypoint — controller corrects"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. ATC corrects incomplete climb readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_CLIMB_READBACK_INCORRECT:
    role: atc
    phase: departure
    name: "ATC Corrects Climb Readback"
    description: "Controller repeats the cleared level and waypoint for the pilot to read back again"
    say_template: "Negative, {{callsign}}, say again: climb {{climb_altitude}}, direct {{waypoint}}"
    frequency_name: "Departure"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_CLIMB_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Departure confirms correct readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_CLIMB_CONFIRMED:
    role: atc
    phase: departure
    name: "Departure Confirms Readback"
    description: "Departure control confirms the readback was correct"
    say_template: "Readback correct, {{callsign}}"
    frequency_name: "Departure"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: DEPARTURE_COMPLETE
        label: "Departure phase complete"
        on_enter_actions:
          - type: set_flag
            target: readback_correct
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. End state
  # ─────────────────────────────────────────────────────────────────────────────
  DEPARTURE_COMPLETE:
    role: system
    phase: departure
    name: "Departure Phase Complete"
    description: "Initial climb clearance received and read back correctly. Continue climb to {{climb_altitude}}."

    ok_next: []
    bad_next: []
    auto_transitions: []
