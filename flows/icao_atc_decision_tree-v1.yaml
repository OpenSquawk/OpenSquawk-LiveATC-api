slug: icao_atc_decision_tree
schema_version: "2.0"
name: "ICAO ATC Decision Tree"
description: "Full ATC training flow — clearance phase (Phase 1 of full ICAO flow)"

start_state: REQUESTING_CLEARANCE
end_states:
  - CLEARANCE_COMPLETE

variables:
  callsign:
    type: string
    initial: ""
    mutable_by: action_only
  runway:
    type: enum
    enum_values: ["25L", "25R", "07L", "07R"]
    initial: "25R"
    mutable_by: action_only
  airline_name:
    type: string
    initial: "Lufthansa"
    mutable_by: action_only

flags:
  gates_clear:
    initial: true
  frequency_set:
    initial: false
  readback_timeout:
    initial: false

entry_mode: main

states:
  REQUESTING_CLEARANCE:
    role: pilot
    phase: clearance
    name: "Requesting Clearance"
    description: "Pilot calls ground and requests clearance to push back"
    expected_pilot_template: "{{airline_name}} {{callsign}}, ready for pushback"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next:
      - to: ATC_ISSUES_CLEARANCE
        trigger: "ready|push.*back|request.*clear"
        condition:
          type: flag_check
          name: gates_clear
        label: "Pilot requests pushback correctly"

    bad_next:
      - to: REQUESTING_CLEARANCE
        label: "Incorrect or incomplete request — try again"
        # No trigger: bad_next is selected when no ok_next matched (not by regex)

    auto_transitions: []

  ATC_ISSUES_CLEARANCE:
    role: atc
    phase: clearance
    name: "ATC Issues Clearance"
    description: "Controller issues pushback clearance and runway assignment"
    say_template: "{{callsign}}, cleared to {{runway}}, push back approved, advise ready"
    expected_pilot_template: "Readback {{runway}}"
    frequency: "121.800"
    frequency_name: "Ground"

    # ATC state — auto-transition immediately to readback state
    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_READBACK
        label: "ATC finished speaking, wait for pilot readback"

  PILOT_READBACK:
    role: pilot
    phase: clearance
    name: "Pilot Reads Back Clearance"
    description: "Pilot must read back the runway assignment"
    expected_pilot_template: "{{callsign}}, push back approved, runway {{runway}}"
    frequency: "121.800"
    frequency_name: "Ground"

    readback_required:
      - runway
    readback_mode: simple
    auto_advance_on_silence: true
    auto_advance_timeout_ms: 30000

    ok_next:
      - to: CLEARANCE_COMPLETE
        trigger: ".*"
        label: "Pilot readback — readback evaluator decides ok/bad"
        on_exit_actions: []
        on_enter_actions:
          - type: set_flag
            target: frequency_set
            value: true

    bad_next:
      - to: PILOT_READBACK
        trigger: ".*"
        label: "Readback incomplete — try again"

    auto_transitions: []

  CLEARANCE_COMPLETE:
    role: system
    phase: clearance
    name: "Clearance Granted"
    description: "Clearance phase complete. Ready for taxi."
    say_template: "Readback correct. {{callsign}}, push back when ready."

    ok_next: []
    bad_next: []
    auto_transitions: []

  # MAYDAY_HANDLER is reached via is_emergency transitions from pilot states.
  # Add transitions like this to any pilot state's ok_next to enable emergency routing:
  #   - to: MAYDAY_HANDLER
  #     trigger: "mayday|pan.pan"
  #     is_emergency: true
  #     label: "Emergency declaration"
  MAYDAY_HANDLER:
    role: system
    name: "Emergency — MAYDAY"
    description: "Immediate handling of emergency declaration"
    is_emergency: true
    say_template: "{{callsign}}, say nature of emergency"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: CLEARANCE_COMPLETE
        label: "Auto-close emergency flow"
