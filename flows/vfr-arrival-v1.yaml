slug: vfr-arrival-v1
schema_version: "2.0"
name: "VFR Arrival — Control Zone Entry and Circuit Join"
description: "VFR pilot contacts Tower directly, is cleared to enter the control zone via a named reporting point, reports that point, and is told how to join the traffic circuit. German-style phraseology with aircraft registration callsign."

start_state: INITIAL_CONTACT
end_states:
  - VFR_ARRIVAL_COMPLETE

# After joining the circuit, the pilot continues on Tower for circuit and landing.
next_flow: vfr-circuit-landing-v1

entry_mode: main

variables:
  # Full aircraft registration — the pilot uses this on the first call.
  callsign:
    type: string
    initial: "D-EMIL"
    mutable_by: action_only
  # Abbreviated registration (first letter + last two), used by ATC after the
  # first contact, per real radiotelephony (D-EMIL -> D-IL).
  callsign_short:
    type: string
    initial: "D-IL"
    mutable_by: action_only
  aircraft_type:
    type: string
    initial: "C172"
    mutable_by: action_only
  origin:
    type: string
    initial: "Stuttgart"
    mutable_by: action_only
  position:
    type: string
    initial: "10 miles north"
    mutable_by: action_only
  altitude:
    type: string
    initial: "2500"
    mutable_by: action_only
  information:
    type: string
    initial: "G"
    mutable_by: action_only
  # Named VFR entry / compulsory reporting point.
  entry_point:
    type: string
    initial: "November"
    mutable_by: action_only
  qnh:
    type: string
    initial: "1013"
    mutable_by: action_only
  runway:
    type: string
    initial: "25L"
    mutable_by: action_only
  surface_wind:
    type: string
    initial: "250/07"
    mutable_by: action_only
  # Circuit direction word only: "left" or "right" (spoken "left/right downwind",
  # never "left hand").
  circuit_direction:
    type: string
    initial: "left"
    mutable_by: action_only
  tower_freq:
    type: string
    initial: "118.700"
    mutable_by: action_only

flags:
  ctr_entry_cleared:
    initial: false
  joining_cleared:
    initial: false

states:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Pilot calls Tower directly with full VFR position report and intended entry
  # ─────────────────────────────────────────────────────────────────────────────
  INITIAL_CONTACT:
    role: pilot
    phase: arrival
    name: "Initial Contact with Tower"
    description: "VFR pilot calls Tower with registration, type, VFR origin, position, altitude, intention to land, and the named point they intend to enter via. Order: callsign, type, VFR from origin, position, altitude, for landing via entry point."
    expected_pilot_template: "{{callsign}}, {{aircraft_type}}, VFR from {{origin}}, {{position}}, {{altitude}} feet, for landing via {{entry_point}}"
    frequency_name: "Tower"
    allow_greeting: true

    ok_next:
      - to: ATC_ENTER_CTR
        trigger: "VFR|for landing|landing|inbound|via|request"
        label: "Pilot gave initial VFR position report"

    bad_next:
      - to: ATC_INITIAL_CONTACT_INCORRECT
        label: "Incomplete call — controller prompts for callsign, type, VFR origin, position, altitude, and intentions"

    auto_transitions: []

  ATC_INITIAL_CONTACT_INCORRECT:
    role: atc
    phase: arrival
    name: "ATC Prompts for Full Position Report"
    description: "Controller asks the pilot to give a full initial call including type, VFR from origin, position, altitude, and intentions"
    say_template: "{{callsign}}, say again, pass your type, position, altitude and intentions"
    frequency_name: "Tower"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: INITIAL_CONTACT
        label: "Prompt given — pilot to retry"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Tower clears entry into the control zone via the named point
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_ENTER_CTR:
    role: atc
    phase: arrival
    name: "Tower Clears Control Zone Entry"
    description: "Tower clears the aircraft to enter the control zone via the named point, with active runway, QNH and surface wind"
    say_template: "{{callsign_short}}, enter control zone via {{entry_point}}, runway {{runway}}, QNH {{qnh}}, wind {{surface_wind}}"
    frequency_name: "Tower"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_ENTER_CTR_READBACK
        label: "Entry clearance issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: ctr_entry_cleared
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Pilot reads back the entry clearance
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_ENTER_CTR_READBACK:
    role: pilot
    phase: arrival
    name: "Pilot Reads Back Entry Clearance"
    description: "Pilot reads back entry via the named point, runway, and QNH"
    expected_pilot_template: "Enter control zone via {{entry_point}}, runway {{runway}}, QNH {{qnh}}, {{callsign}}"
    frequency_name: "Tower"

    readback_required:
      - runway
      - qnh
    readback_mode: simple

    ok_next:
      - to: REPORT_ENTRY_POINT
        trigger: ".*"
        label: "Entry readback evaluated — correct"

    bad_next:
      - to: ATC_ENTER_CTR_READBACK_INCORRECT
        label: "Readback missing runway or QNH — controller corrects"

    auto_transitions: []

  ATC_ENTER_CTR_READBACK_INCORRECT:
    role: atc
    phase: arrival
    name: "ATC Corrects Entry Readback"
    description: "Controller repeats the runway and QNH for the pilot to read back"
    say_template: "Negative, {{callsign_short}}, say again: runway {{runway}}, QNH {{qnh}}"
    frequency_name: "Tower"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_ENTER_CTR_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Pilot reports reaching the named entry point
  # ─────────────────────────────────────────────────────────────────────────────
  REPORT_ENTRY_POINT:
    role: pilot
    phase: arrival
    name: "Position Report at Entry Point"
    description: "Pilot reports position overhead / at the named entry point with altitude"
    expected_pilot_template: "{{callsign}}, position {{entry_point}}, {{altitude}} feet"
    frequency_name: "Tower"

    ok_next:
      - to: ATC_JOIN_CIRCUIT
        trigger: "position|over|overhead|abeam|reaching|approaching|november|whiskey|sierra|point"
        label: "Pilot reported the entry point"

    bad_next:
      - to: ATC_REPORT_ENTRY_INCORRECT
        label: "No clear position report — controller prompts"

    auto_transitions: []

  ATC_REPORT_ENTRY_INCORRECT:
    role: atc
    phase: arrival
    name: "ATC Prompts for Position Report"
    description: "Controller asks the pilot to report their position"
    say_template: "{{callsign_short}}, say again, report your position"
    frequency_name: "Tower"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: REPORT_ENTRY_POINT
        label: "Prompt given — pilot to retry"

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Tower instructs how to join the traffic circuit
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_JOIN_CIRCUIT:
    role: atc
    phase: arrival
    name: "Tower Issues Circuit Join"
    description: "Tower instructs the pilot to join the traffic circuit in the published direction and to report downwind"
    say_template: "{{callsign_short}}, join {{circuit_direction}} traffic circuit runway {{runway}}, report downwind"
    frequency_name: "Tower"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_JOIN_READBACK
        label: "Circuit join issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: joining_cleared
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Pilot reads back the circuit join
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_JOIN_READBACK:
    role: pilot
    phase: arrival
    name: "Pilot Reads Back Circuit Join"
    description: "Pilot reads back the circuit direction and runway, wilco for the downwind report"
    expected_pilot_template: "Join {{circuit_direction}} traffic circuit runway {{runway}}, wilco, {{callsign}}"
    frequency_name: "Tower"

    readback_required:
      - runway
      - circuit_direction
    readback_mode: simple

    ok_next:
      - to: VFR_ARRIVAL_COMPLETE
        trigger: ".*"
        label: "Circuit-join readback evaluated — correct"

    bad_next:
      - to: ATC_JOIN_READBACK_INCORRECT
        label: "Readback missing runway or circuit direction — controller corrects"

    auto_transitions: []

  ATC_JOIN_READBACK_INCORRECT:
    role: atc
    phase: arrival
    name: "ATC Corrects Circuit-Join Readback"
    description: "Controller repeats the circuit direction and runway for the pilot"
    say_template: "Negative, {{callsign_short}}, say again: join {{circuit_direction}} traffic circuit runway {{runway}}"
    frequency_name: "Tower"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_JOIN_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. End state — continue on Tower for the circuit and landing
  # ─────────────────────────────────────────────────────────────────────────────
  VFR_ARRIVAL_COMPLETE:
    role: system
    phase: arrival
    name: "VFR Arrival Phase Complete"
    description: "Cleared to join the circuit. Continue with Tower for the circuit and landing."

    ok_next: []
    bad_next: []
    auto_transitions: []
