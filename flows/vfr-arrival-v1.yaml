slug: vfr-arrival-v1
schema_version: "2.0"
name: "VFR Arrival — Initial Approach Contact"
description: "VFR pilot makes initial contact with Approach/Radar, receives squawk and QNH, gets joining clearance for the circuit, and is handed off to Tower"

start_state: INITIAL_CONTACT
end_states:
  - VFR_ARRIVAL_COMPLETE

entry_mode: main

variables:
  callsign:
    type: string
    initial: "G-ABCD"
    mutable_by: action_only
  aircraft_type:
    type: string
    initial: "C172"
    mutable_by: action_only
  origin:
    type: string
    initial: "Walden"
    mutable_by: action_only
  position:
    type: string
    initial: "10 miles north"
    mutable_by: action_only
  altitude:
    type: string
    initial: "2500"
    mutable_by: action_only
  information:
    type: string
    initial: "G"
    mutable_by: action_only
  assigned_squawk:
    type: string
    initial: "3651"
    mutable_by: action_only
  qnh:
    type: string
    initial: "1013"
    mutable_by: action_only
  runway:
    type: string
    initial: "25L"
    mutable_by: action_only
  circuit_direction:
    type: string
    initial: "left hand"
    mutable_by: action_only
  join_position:
    type: string
    initial: "downwind"
    mutable_by: action_only
  report_point:
    type: string
    initial: "aerodrome in sight"
    mutable_by: action_only
  tower_freq:
    type: string
    initial: "118.700"
    mutable_by: action_only

flags:
  squawk_assigned:
    initial: false
  joining_cleared:
    initial: false

states:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Pilot makes initial call to Approach with full position report
  # ─────────────────────────────────────────────────────────────────────────────
  INITIAL_CONTACT:
    role: pilot
    phase: arrival
    name: "Initial Contact with Approach"
    description: "Pilot calls Approach with callsign, aircraft type, VFR origin, position, altitude, intentions, and information code. Order: station, callsign, type, VFR from origin, position, altitude, for landing, information code."
    expected_pilot_template: "{{callsign}}, {{aircraft_type}}, VFR from {{origin}}, {{position}}, {{altitude}} feet, for landing, information {{information}}"
    frequency_name: "Approach"

    ok_next:
      - to: ATC_SQUAWK_QNH
        trigger: "VFR|from|for landing|information|inbound|landing"
        label: "Pilot gave initial position report with required elements"

    bad_next:
      - to: INITIAL_CONTACT
        label: "Incomplete initial call — include callsign, type, VFR from origin, position, altitude, intentions, and information code"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Approach assigns squawk and passes QNH
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_SQUAWK_QNH:
    role: atc
    phase: arrival
    name: "Approach Assigns Squawk and QNH"
    description: "Approach controller assigns a transponder code and passes the QNH"
    say_template: "{{callsign}}, squawk {{assigned_squawk}}, QNH {{qnh}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_SQUAWK_READBACK
        label: "Squawk and QNH given — await pilot readback"

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Pilot reads back squawk and QNH
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_SQUAWK_READBACK:
    role: pilot
    phase: arrival
    name: "Pilot Reads Back Squawk and QNH"
    description: "Pilot reads back the assigned transponder code and QNH"
    expected_pilot_template: "Squawk {{assigned_squawk}}, QNH {{qnh}}, {{callsign}}"
    frequency_name: "Approach"

    readback_required:
      - assigned_squawk
      - qnh
    readback_mode: simple

    ok_next:
      - to: ATC_IDENTIFIED_JOINING
        trigger: ".*"
        label: "Squawk readback evaluated — correct"

    bad_next:
      - to: ATC_SQUAWK_READBACK_INCORRECT
        label: "Readback missing squawk or QNH — controller corrects"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. ATC corrects incomplete squawk/QNH readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_SQUAWK_READBACK_INCORRECT:
    role: atc
    phase: arrival
    name: "ATC Corrects Squawk Readback"
    description: "Controller repeats the squawk code and QNH for the pilot to read back correctly"
    say_template: "Negative, {{callsign}}, say again: squawk {{assigned_squawk}}, QNH {{qnh}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_SQUAWK_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Approach identifies aircraft and issues joining clearance
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_IDENTIFIED_JOINING:
    role: atc
    phase: arrival
    name: "Approach Issues Joining Clearance"
    description: "Approach confirms radar identification and issues joining clearance specifying runway, circuit direction, join position, and reporting point"
    say_template: "{{callsign}}, identified, runway {{runway}}, join {{circuit_direction}} {{join_position}}, report {{report_point}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_JOINING_READBACK
        label: "Joining clearance issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: squawk_assigned
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Pilot reads back joining clearance
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_JOINING_READBACK:
    role: pilot
    phase: arrival
    name: "Pilot Reads Back Joining Clearance"
    description: "Pilot reads back the circuit direction, join position, and runway — confirms with callsign"
    expected_pilot_template: "Join {{circuit_direction}} {{join_position}} runway {{runway}}, wilco, {{callsign}}"
    frequency_name: "Approach"

    readback_required:
      - runway
      - circuit_direction
    readback_mode: simple

    ok_next:
      - to: ATC_TOWER_HANDOFF
        trigger: ".*"
        label: "Joining readback evaluated — correct"

    bad_next:
      - to: ATC_JOINING_READBACK_INCORRECT
        label: "Readback missing runway or circuit direction — controller corrects"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. ATC corrects incomplete joining readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_JOINING_READBACK_INCORRECT:
    role: atc
    phase: arrival
    name: "ATC Corrects Joining Readback"
    description: "Controller repeats circuit direction and runway for the pilot"
    say_template: "Negative, {{callsign}}, say again: join {{circuit_direction}} {{join_position}} runway {{runway}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_JOINING_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 8. Approach hands pilot off to Tower
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TOWER_HANDOFF:
    role: atc
    phase: arrival
    name: "Approach Hands Off to Tower"
    description: "Approach controller instructs the pilot to contact Tower on the assigned frequency"
    say_template: "{{callsign}}, contact tower {{tower_freq}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_TOWER_FREQ_READBACK
        label: "Tower handoff given — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: joining_cleared
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 9. Pilot reads back tower frequency
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_TOWER_FREQ_READBACK:
    role: pilot
    phase: arrival
    name: "Pilot Reads Back Tower Frequency"
    description: "Pilot reads back the tower frequency and own callsign to confirm frequency change"
    expected_pilot_template: "{{tower_freq}}, {{callsign}}"
    frequency_name: "Approach"

    readback_required:
      - tower_freq
    readback_mode: simple

    ok_next:
      - to: VFR_ARRIVAL_COMPLETE
        trigger: ".*"
        label: "Frequency readback evaluated — correct"

    bad_next:
      - to: ATC_TOWER_FREQ_READBACK_INCORRECT
        label: "Readback missing tower frequency — controller corrects"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 10. ATC corrects incomplete frequency readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TOWER_FREQ_READBACK_INCORRECT:
    role: atc
    phase: arrival
    name: "ATC Corrects Tower Frequency Readback"
    description: "Controller repeats the tower frequency for the pilot"
    say_template: "Negative, {{callsign}}, tower on {{tower_freq}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_TOWER_FREQ_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 11. End state — switching to Tower
  # ─────────────────────────────────────────────────────────────────────────────
  VFR_ARRIVAL_COMPLETE:
    role: system
    phase: arrival
    name: "VFR Arrival Phase Complete"
    description: "Joining clearance received. Switch to tower {{tower_freq}} for circuit and landing."

    ok_next: []
    bad_next: []
    auto_transitions: []
