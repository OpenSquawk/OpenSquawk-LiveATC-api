slug: ifr-arrival-v1
schema_version: "2.0"
name: "IFR Arrival — STAR, Approach and ILS"
description: "Full European IFR arrival: pilot checks in inbound with Approach, is cleared a STAR with descent, descends below the transition level onto QNH with speed control, is radar-vectored with progressive speed reductions, cleared the ILS, and handed to Tower"

start_state: INITIAL_CONTACT
end_states:
  - APPROACH_COMPLETE

# After the ILS clearance and tower handoff, the pilot reports to Tower for landing.
next_flow: ifr-tower-landing-v1

entry_mode: main

variables:
  callsign:
    type: string
    initial: "DLH6RK"
    mutable_by: action_only
  information:
    type: string
    initial: "K"
    mutable_by: action_only
  # Level the pilot is descending to on first contact (cleared earlier by Area Control).
  descend_level:
    type: string
    initial: "FL100"
    mutable_by: action_only
  # Standard Terminal Arrival Route the pilot is cleared to fly.
  star:
    type: string
    initial: "ROKIL1A"
    mutable_by: action_only
  star_level:
    type: string
    initial: "FL80"
    mutable_by: action_only
  intermediate_altitude:
    type: string
    initial: "5000"
    mutable_by: action_only
  qnh:
    type: string
    initial: "1013"
    mutable_by: action_only
  # Transition level passed by ATC during descent (FL at/above which QNL→QNH switch occurs).
  transition_level:
    type: string
    initial: "70"
    mutable_by: action_only
  speed_initial:
    type: string
    initial: "220"
    mutable_by: action_only
  heading_intermediate:
    type: string
    initial: "320"
    mutable_by: action_only
  intercept_altitude:
    type: string
    initial: "4000"
    mutable_by: action_only
  speed_intermediate:
    type: string
    initial: "180"
    mutable_by: action_only
  heading_final:
    type: string
    initial: "290"
    mutable_by: action_only
  approach_type:
    type: string
    initial: "ILS"
    mutable_by: action_only
  runway:
    type: string
    initial: "26L"
    mutable_by: action_only
  speed_final:
    type: string
    initial: "160"
    mutable_by: action_only
  dme:
    type: string
    initial: "4"
    mutable_by: action_only
  tower_freq:
    type: string
    initial: "118.700"
    mutable_by: action_only

flags:
  identified:
    initial: false
  star_cleared:
    initial: false
  approach_cleared:
    initial: false

states:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Pilot checks in with Approach, inbound and descending
  # ─────────────────────────────────────────────────────────────────────────────
  INITIAL_CONTACT:
    role: pilot
    phase: approach
    name: "Initial Contact with Approach"
    description: "Pilot calls Approach with callsign, the level they are descending to, and the current ATIS information code"
    expected_pilot_template: "{{callsign}}, descending {{descend_level}}, information {{information}}"
    frequency_name: "Approach"
    allow_greeting: true

    ok_next:
      - to: ATC_STAR_CLEARANCE
        trigger: "descend|descending|information|inbound|with you|FL|level|passing"
        label: "Pilot checked in inbound with required elements"

    bad_next:
      - to: ATC_INITIAL_CONTACT_INCORRECT
        label: "Incomplete check-in — controller prompts for callsign, level, and information"

    auto_transitions: []

  ATC_INITIAL_CONTACT_INCORRECT:
    role: atc
    phase: approach
    name: "ATC Prompts for Correct Check-in"
    description: "Controller asks the pilot to pass callsign, present level, and information code"
    say_template: "{{callsign}}, say again, pass your callsign, level, and information code"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: INITIAL_CONTACT
        label: "Prompt given — pilot to retry check-in"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Approach identifies and clears the STAR with descent
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_STAR_CLEARANCE:
    role: atc
    phase: approach
    name: "Approach Clears the STAR"
    description: "Approach radar-identifies the aircraft, clears it to fly the STAR with a descent, and states the approach to expect"
    say_template: "{{callsign}}, identified, cleared {{star}} arrival, descend via STAR to {{star_level}}, expect {{approach_type}} approach runway {{runway}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_STAR_READBACK
        label: "STAR clearance issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: identified
            value: true
          - type: set_flag
            target: star_cleared
            value: true

  PILOT_STAR_READBACK:
    role: pilot
    phase: approach
    name: "Pilot Reads Back STAR Clearance"
    description: "Pilot reads back the STAR and cleared level — both mandatory"
    expected_pilot_template: "Cleared {{star}} arrival, descend via STAR to {{star_level}}, expect {{approach_type}} runway {{runway}}, {{callsign}}"
    frequency_name: "Approach"

    readback_required:
      - star
      - star_level
    readback_mode: simple

    ok_next:
      - to: ATC_DESCENT_QNH
        trigger: ".*"
        label: "STAR readback evaluated — correct"

    bad_next:
      - to: ATC_STAR_READBACK_INCORRECT
        label: "Readback missing STAR or level — controller corrects"

    auto_transitions: []

  ATC_STAR_READBACK_INCORRECT:
    role: atc
    phase: approach
    name: "ATC Corrects STAR Readback"
    description: "Controller repeats the STAR and the cleared level for the pilot"
    say_template: "Negative, {{callsign}}, say again: cleared {{star}} arrival, descend to {{star_level}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_STAR_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Descent below transition level onto QNH, with transition level + speed
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_DESCENT_QNH:
    role: atc
    phase: approach
    name: "Approach Descends onto QNH"
    description: "Approach descends the aircraft to an altitude on QNH, passes the transition level, and assigns an initial speed"
    say_template: "{{callsign}}, descend altitude {{intermediate_altitude}} feet, QNH {{qnh}}, transition level {{transition_level}}, speed {{speed_initial}} knots"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_DESCENT_READBACK
        label: "Descent + QNH issued — await pilot readback"

  PILOT_DESCENT_READBACK:
    role: pilot
    phase: approach
    name: "Pilot Reads Back Descent and QNH"
    description: "Pilot reads back cleared altitude, QNH, transition level and assigned speed — all mandatory"
    expected_pilot_template: "Descend altitude {{intermediate_altitude}} feet, QNH {{qnh}}, transition level {{transition_level}}, speed {{speed_initial}} knots, {{callsign}}"
    frequency_name: "Approach"

    readback_required:
      - intermediate_altitude
      - qnh
      - transition_level
      - speed_initial
    readback_mode: simple

    ok_next:
      - to: ATC_INTERMEDIATE_VECTOR
        trigger: ".*"
        label: "Descent readback evaluated — correct"

    bad_next:
      - to: ATC_DESCENT_READBACK_INCORRECT
        label: "Readback missing altitude, QNH, transition level or speed — controller corrects"

    auto_transitions: []

  ATC_DESCENT_READBACK_INCORRECT:
    role: atc
    phase: approach
    name: "ATC Corrects Descent Readback"
    description: "Controller repeats the cleared altitude, QNH and transition level for the pilot"
    say_template: "Negative, {{callsign}}, say again: descend altitude {{intermediate_altitude}} feet, QNH {{qnh}}, transition level {{transition_level}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_DESCENT_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Radar vector to base with a speed reduction
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_INTERMEDIATE_VECTOR:
    role: atc
    phase: approach
    name: "Approach Vectors with Speed Reduction"
    description: "Approach gives a closing heading toward final, a further descent, and reduces speed"
    say_template: "{{callsign}}, turn left heading {{heading_intermediate}}, descend {{intercept_altitude}} feet, reduce speed {{speed_intermediate}} knots"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_VECTOR_READBACK
        label: "Vector + speed issued — await pilot readback"

  PILOT_VECTOR_READBACK:
    role: pilot
    phase: approach
    name: "Pilot Reads Back Vector"
    description: "Pilot reads back heading, altitude and speed — all mandatory"
    expected_pilot_template: "Heading {{heading_intermediate}}, descend {{intercept_altitude}} feet, speed {{speed_intermediate}} knots, {{callsign}}"
    frequency_name: "Approach"

    readback_required:
      - heading_intermediate
      - intercept_altitude
      - speed_intermediate
    readback_mode: simple

    ok_next:
      - to: ATC_ILS_CLEARANCE
        trigger: ".*"
        label: "Vector readback evaluated — correct"

    bad_next:
      - to: ATC_VECTOR_READBACK_INCORRECT
        label: "Readback missing heading, altitude or speed — controller corrects"

    auto_transitions: []

  ATC_VECTOR_READBACK_INCORRECT:
    role: atc
    phase: approach
    name: "ATC Corrects Vector Readback"
    description: "Controller repeats the heading, altitude and speed for the pilot"
    say_template: "Negative, {{callsign}}, say again: heading {{heading_intermediate}}, descend {{intercept_altitude}} feet, speed {{speed_intermediate}} knots"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_VECTOR_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Final closing heading and ILS clearance with speed to DME
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_ILS_CLEARANCE:
    role: atc
    phase: approach
    name: "Approach Issues ILS Clearance"
    description: "Approach gives the final intercept heading, clears the ILS approach, and assigns a speed to hold to a DME distance"
    say_template: "{{callsign}}, turn left heading {{heading_final}}, cleared {{approach_type}} approach runway {{runway}}, speed {{speed_final}} knots until {{dme}} DME"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_ILS_READBACK
        label: "ILS clearance issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: approach_cleared
            value: true

  PILOT_ILS_READBACK:
    role: pilot
    phase: approach
    name: "Pilot Reads Back ILS Clearance"
    description: "Pilot reads back the final heading, cleared approach and runway, and the speed restriction — heading and runway mandatory"
    expected_pilot_template: "Heading {{heading_final}}, cleared {{approach_type}} approach runway {{runway}}, speed {{speed_final}} knots until {{dme}} DME, {{callsign}}"
    frequency_name: "Approach"

    readback_required:
      - heading_final
      - runway
      - speed_final
    readback_mode: simple

    ok_next:
      - to: ATC_TOWER_HANDOFF
        trigger: ".*"
        label: "ILS readback evaluated — correct"

    bad_next:
      - to: ATC_ILS_READBACK_INCORRECT
        label: "Readback missing heading, runway or speed — controller corrects"

    auto_transitions: []

  ATC_ILS_READBACK_INCORRECT:
    role: atc
    phase: approach
    name: "ATC Corrects ILS Readback"
    description: "Controller repeats the final heading, cleared approach and speed for the pilot"
    say_template: "Negative, {{callsign}}, say again: heading {{heading_final}}, cleared {{approach_type}} approach runway {{runway}}, speed {{speed_final}} knots"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_ILS_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Approach hands the pilot off to Tower
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TOWER_HANDOFF:
    role: atc
    phase: approach
    name: "Approach Hands Off to Tower"
    description: "Established on the approach, the pilot is instructed to contact Tower"
    say_template: "{{callsign}}, contact tower {{tower_freq}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_TOWER_FREQ_READBACK
        label: "Tower handoff given — await pilot readback"

  PILOT_TOWER_FREQ_READBACK:
    role: pilot
    phase: approach
    name: "Pilot Reads Back Tower Frequency"
    description: "Pilot reads back the tower frequency and own callsign to confirm the frequency change"
    expected_pilot_template: "{{tower_freq}}, {{callsign}}"
    frequency_name: "Approach"

    readback_required:
      - tower_freq
    readback_mode: simple

    ok_next:
      - to: APPROACH_COMPLETE
        trigger: ".*"
        label: "Tower frequency readback evaluated — correct"

    bad_next:
      - to: ATC_TOWER_FREQ_READBACK_INCORRECT
        label: "Readback missing tower frequency — controller corrects"

    auto_transitions: []

  ATC_TOWER_FREQ_READBACK_INCORRECT:
    role: atc
    phase: approach
    name: "ATC Corrects Tower Frequency Readback"
    description: "Controller repeats the tower frequency for the pilot"
    say_template: "Negative, {{callsign}}, tower on {{tower_freq}}"
    frequency_name: "Approach"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_TOWER_FREQ_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. End state — switching to Tower for landing
  # ─────────────────────────────────────────────────────────────────────────────
  APPROACH_COMPLETE:
    role: system
    phase: approach
    name: "Approach Phase Complete"
    description: "Established and cleared for the approach. Switch to tower {{tower_freq}} for landing."

    ok_next: []
    bad_next: []
    auto_transitions: []
