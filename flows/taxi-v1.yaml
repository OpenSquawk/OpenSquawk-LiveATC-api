slug: taxi-v1
schema_version: "2.0"
name: "Ground Movement — Startup, Pushback and Taxi"
description: "IFR commercial sequence: startup request → startup approved → pushback → taxi to runway holding point"

start_state: REQUEST_STARTUP
end_states:
  - TAXI_COMPLETE

# After taxi completes, pilot holds short and contacts tower for departure.
next_flow: tower-v1

entry_mode: main

variables:
  callsign:
    type: string
    initial: "DLH39A"
    mutable_by: action_only
  stand:
    type: string
    initial: "A12"
    mutable_by: action_only
  information:
    type: string
    initial: "K"
    mutable_by: action_only
  qnh:
    type: string
    initial: "1013"
    mutable_by: action_only
  pushback_direction:
    type: string
    initial: "west"
    mutable_by: action_only
  runway:
    type: string
    initial: "25L"
    mutable_by: action_only
  taxi_route:
    type: string
    initial: "Alpha, Bravo"
    mutable_by: action_only
  hold_short:
    type: string
    initial: "07"
    mutable_by: action_only
  tower_freq:
    type: string
    initial: "118.700"
    mutable_by: action_only

flags:
  startup_approved:
    initial: false
  pushback_approved:
    initial: false
  taxi_clearance_given:
    initial: false

states:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Pilot calls ground for startup
  # ─────────────────────────────────────────────────────────────────────────────
  REQUEST_STARTUP:
    role: pilot
    phase: taxi
    name: "Request Startup"
    description: "Pilot calls ground with callsign, stand, current ATIS information code, and requests startup clearance"
    expected_pilot_template: "{{callsign}}, stand {{stand}}, information {{information}}, request startup"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next:
      - to: ATC_STARTUP_CLEARANCE
        trigger: "start.*up|startup|request.*start|information"
        label: "Pilot requested startup with required elements"

    bad_next:
      - to: ATC_REQUEST_STARTUP_INCORRECT
        label: "Incomplete call — controller prompts for callsign, stand, information, and startup request"

    auto_transitions: []

  ATC_REQUEST_STARTUP_INCORRECT:
    role: atc
    phase: taxi
    name: "ATC Prompts for Startup Request"
    description: "Controller asks the pilot to include all required elements in the startup request"
    say_template: "{{callsign}}, say again with stand number, information code, and startup request"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: REQUEST_STARTUP
        label: "Prompt given — pilot to retry"

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Ground approves startup and gives QNH
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_STARTUP_CLEARANCE:
    role: atc
    phase: taxi
    name: "Ground Approves Startup"
    description: "Ground controller approves startup and passes QNH"
    say_template: "{{callsign}}, startup approved, QNH {{qnh}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_STARTUP_READBACK
        label: "Startup clearance issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: startup_approved
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Pilot reads back startup clearance
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_STARTUP_READBACK:
    role: pilot
    phase: taxi
    name: "Pilot Reads Back Startup Clearance"
    description: "Pilot reads back startup approval and QNH"
    expected_pilot_template: "Startup approved, QNH {{qnh}}, {{callsign}}"
    frequency: "121.800"
    frequency_name: "Ground"

    readback_required:
      - qnh
    readback_mode: simple

    ok_next:
      - to: REQUEST_PUSHBACK
        trigger: ".*"
        label: "Startup readback correct — engines starting"

    bad_next:
      - to: ATC_STARTUP_READBACK_INCORRECT
        label: "Readback missing QNH — controller corrects"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. ATC corrects incomplete startup readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_STARTUP_READBACK_INCORRECT:
    role: atc
    phase: taxi
    name: "ATC Corrects Startup Readback"
    description: "Controller repeats QNH for pilot to include in readback"
    say_template: "Negative, {{callsign}}, say again: QNH {{qnh}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_STARTUP_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Pilot requests pushback (engines running)
  # ─────────────────────────────────────────────────────────────────────────────
  REQUEST_PUSHBACK:
    role: pilot
    phase: taxi
    name: "Request Pushback"
    description: "Pilot calls ground with callsign, stand number, and requests pushback"
    expected_pilot_template: "{{callsign}}, stand {{stand}}, request pushback"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next:
      - to: ATC_PUSHBACK_CLEARANCE
        trigger: "push.*back|pushback"
        label: "Pilot requested pushback"

    bad_next:
      - to: ATC_REQUEST_PUSHBACK_INCORRECT
        label: "Incomplete call — controller prompts for callsign, stand, and pushback request"

    auto_transitions: []

  ATC_REQUEST_PUSHBACK_INCORRECT:
    role: atc
    phase: taxi
    name: "ATC Prompts for Pushback Request"
    description: "Controller asks the pilot to include stand number and pushback request"
    say_template: "{{callsign}}, say again with stand number and pushback request"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: REQUEST_PUSHBACK
        label: "Prompt given — pilot to retry"

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Ground issues pushback clearance with facing direction
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_PUSHBACK_CLEARANCE:
    role: atc
    phase: taxi
    name: "Ground Grants Pushback"
    description: "Ground controller issues pushback clearance with stand number and facing direction"
    say_template: "{{callsign}}, pushback approved, stand {{stand}}, face {{pushback_direction}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_PUSHBACK_READBACK
        label: "Pushback clearance issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: pushback_approved
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. Pilot reads back pushback clearance
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_PUSHBACK_READBACK:
    role: pilot
    phase: taxi
    name: "Pilot Reads Back Pushback Clearance"
    description: "Pilot reads back stand number and facing direction to confirm pushback clearance"
    expected_pilot_template: "Pushback approved, stand {{stand}}, face {{pushback_direction}}, {{callsign}}"
    frequency: "121.800"
    frequency_name: "Ground"

    readback_required:
      - pushback_direction
    readback_mode: simple

    ok_next:
      - to: REQUEST_TAXI
        trigger: ".*"
        label: "Pushback readback correct"

    bad_next:
      - to: ATC_PUSHBACK_READBACK_INCORRECT
        label: "Readback missing facing direction — controller corrects"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 8. ATC corrects incomplete pushback readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_PUSHBACK_READBACK_INCORRECT:
    role: atc
    phase: taxi
    name: "ATC Corrects Pushback Readback"
    description: "Controller repeats facing direction for pilot to include in readback"
    say_template: "Negative, {{callsign}}, say again: face {{pushback_direction}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_PUSHBACK_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 9. Pilot requests taxi to runway (pushback complete)
  # ─────────────────────────────────────────────────────────────────────────────
  REQUEST_TAXI:
    role: pilot
    phase: taxi
    name: "Request Taxi"
    description: "Pilot calls ground ready for taxi, stating destination runway"
    expected_pilot_template: "{{callsign}}, ready for taxi, runway {{runway}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next:
      - to: ATC_TAXI_INSTRUCTIONS
        trigger: "taxi|ready.*taxi|taxi.*runway|request.*taxi"
        label: "Pilot requested taxi"

    bad_next:
      - to: ATC_REQUEST_TAXI_INCORRECT
        label: "Incomplete taxi request — controller prompts for callsign, ready for taxi, and runway"

    auto_transitions: []

  ATC_REQUEST_TAXI_INCORRECT:
    role: atc
    phase: taxi
    name: "ATC Prompts for Taxi Request"
    description: "Controller asks the pilot to include callsign, readiness for taxi, and destination runway"
    say_template: "{{callsign}}, say again, ready for taxi to runway {{runway}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: REQUEST_TAXI
        label: "Prompt given — pilot to retry"

  # ─────────────────────────────────────────────────────────────────────────────
  # 10. Ground issues taxi instructions
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TAXI_INSTRUCTIONS:
    role: atc
    phase: taxi
    name: "Ground Issues Taxi Instructions"
    description: "Ground controller issues detailed routing: runway, taxiway route, and hold-short point"
    say_template: "{{callsign}}, taxi to runway {{runway}} via {{taxi_route}}, hold short runway {{hold_short}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_TAXI_READBACK
        label: "Taxi instructions issued — await pilot readback"
        on_enter_actions:
          - type: set_flag
            target: taxi_clearance_given
            value: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 11. Pilot reads back taxi instructions
  # ─────────────────────────────────────────────────────────────────────────────
  PILOT_TAXI_READBACK:
    role: pilot
    phase: taxi
    name: "Pilot Reads Back Taxi Instructions"
    description: "Pilot reads back runway, taxi route, and hold-short point — runway and hold-short are mandatory"
    expected_pilot_template: "Runway {{runway}} via {{taxi_route}}, hold short runway {{hold_short}}, {{callsign}}"
    frequency: "121.800"
    frequency_name: "Ground"

    readback_required:
      - runway
      - hold_short
    readback_mode: simple

    ok_next:
      - to: ATC_TAXI_CONFIRMED
        trigger: ".*"
        label: "Taxi readback evaluated — correct"

    bad_next:
      - to: ATC_TAXI_READBACK_INCORRECT
        label: "Readback missing runway or hold-short — controller corrects"

    auto_transitions: []

  # ─────────────────────────────────────────────────────────────────────────────
  # 12. ATC corrects incomplete taxi readback
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TAXI_READBACK_INCORRECT:
    role: atc
    phase: taxi
    name: "ATC Corrects Taxi Readback"
    description: "Controller repeats the runway and hold-short point for the pilot"
    say_template: "Negative, {{callsign}}, say again: runway {{runway}}, hold short runway {{hold_short}}"
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: PILOT_TAXI_READBACK
        label: "Correction given — pilot to try again"

  # ─────────────────────────────────────────────────────────────────────────────
  # 13. Ground confirms taxi readback, advises to monitor tower
  # ─────────────────────────────────────────────────────────────────────────────
  ATC_TAXI_CONFIRMED:
    role: atc
    phase: taxi
    name: "Ground Confirms Taxi Readback"
    description: "Ground confirms readback correct and instructs pilot to monitor tower approaching the runway"
    say_template: "Readback correct, {{callsign}}. Monitor tower {{tower_freq}} approaching runway {{runway}}."
    frequency: "121.800"
    frequency_name: "Ground"

    ok_next: []
    bad_next: []
    auto_transitions:
      - to: TAXI_COMPLETE
        label: "Taxi phase complete"

  # ─────────────────────────────────────────────────────────────────────────────
  # 14. End state
  # ─────────────────────────────────────────────────────────────────────────────
  TAXI_COMPLETE:
    role: system
    phase: taxi
    name: "Taxi Complete"
    description: "Ground movement phase complete. Monitor tower {{tower_freq}} when approaching runway {{runway}}."

    ok_next: []
    bad_next: []
    auto_transitions: []
